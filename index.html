<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>PETclub India — Your Complete Pet Care App</title>
    <meta name="description" content="India's most trusted pet care platform. Book grooming, training, vet care & get pet food delivered — all in one app. Now in Hyderabad." />
    <meta name="keywords" content="pet care India, dog grooming Hyderabad, pet training, vet at home, pet food delivery, dog care app, PETclub" />
    <meta name="author" content="PETclub India" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mypetclub.app" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#f97316" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mypetclub.app" />
    <meta property="og:title" content="PETclub India — Your Complete Pet Care App" />
    <meta property="og:description" content="Book grooming, training, vet care & get pet food delivered. India's most trusted pet care platform." />
    <meta property="og:image" content="https://mypetclub.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="PETclub India" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PETclub India — Your Complete Pet Care App" />
    <meta name="twitter:description" content="Book grooming, training, vet care & get pet food delivered." />
    <meta name="twitter:image" content="https://mypetclub.app/og-image.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "PETclub",
      "url": "https://app.mypetclub.app",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, Android, iOS",
      "description": "India's complete pet care app — grooming, training, vet care and food delivery.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "provider": {
        "@type": "Organization",
        "name": "PETclub India",
        "url": "https://mypetclub.app",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Sahara, LB Nagar",
          "addressLocality": "Hyderabad",
          "postalCode": "500074",
          "addressCountry": "IN"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
